trigger:
  branches:
    include:
      - master

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Backend
    jobs:
      - job: TestBackend
        displayName: 'Run Python backend tests'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
          - script: |
              python -m pip install --upgrade pip
              pip install -r backend/requirements.txt
            displayName: 'Install backend dependencies'
          - script: |
              cd backend
              pytest
            displayName: 'Run backend tests'

  - stage: Frontend
    jobs:
      - job: BuildFrontend
        displayName: 'Install and build frontend'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: |
              cd frontend
              npm install
              npm run build
            displayName: 'Install dependencies and build frontend'
